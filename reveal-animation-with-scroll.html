<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Reveal Animation | Asif Imran Khan</title>
    <meta name="description" content="A demonstration of a premium scroll-triggered header animation and hero section.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">

    <style>
        /* -------------------------------------------------------------------------- */
        /*  1. CSS Variables & Reset                                                   */
        /* -------------------------------------------------------------------------- */
        :root {
            box-sizing: border-box;
            font-family: "Bricolage Grotesque", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;

            /* Design Tokens */
            --font-mono: "JetBrains Mono", monospace;
            --smooth-anim: all cubic-bezier(0.16, 1, 0.3, 1) 0.5s;

            /* Colors */
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --header-active-bg: rgba(0, 0, 0, 0.2);
            --accent: #fff;

            /* Animations */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: inherit;
        }

        html,
        body {
            width: 100%;
            margin: 0;
            padding: 0;
            /* Fallback */
        }

        /* -------------------------------------------------------------------------- */
        /*  2. Layout Components                                                      */
        /* -------------------------------------------------------------------------- */

        /* Main centering container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Background image that stays fixed behind content */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            object-fit: cover;
            pointer-events: none;
        }

        /* -------------------------------------------------------------------------- */
        /*  3. Header Section                                                         */
        /* -------------------------------------------------------------------------- */

        .site-header {
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: var(--smooth-anim);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(0px);
            padding: 15px 0;
        }

        /* State when page is scrolled */
        .site-header.header--active {
            backdrop-filter: blur(15px);
            background-color: var(--header-active-bg);
            padding: 12px 0;
        }

        .site-header .container {
            display: flex;
            align-items: center;
        }

        /* Brand Typography */
        .brand-name {
            font-size: 1.3rem;
            font-weight: 200;
            color: var(--text-primary);
            letter-spacing: 0.15em;
            font-family: var(--font-mono);
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Container for the sliding/reveal animation part of the name */
        .brand-reveal-wrapper {
            max-width: 65px;
            /* Adjust based on "IMRAN KHAN" width */
            opacity: 1;
            transition: var(--smooth-anim);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Hide the secondary part of the name on scroll */
        .site-header.header--active .brand-reveal-wrapper {
            max-width: 0;
            opacity: 0;
        }

        /* -------------------------------------------------------------------------- */
        /*  4. Hero Section                                                           */
        /* -------------------------------------------------------------------------- */

        .hero-section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            display: flex;
            flex-direction: column;
            gap: 32px;
            position: relative;
            z-index: 10;
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 6.5rem);
            font-weight: 800;
            color: var(--text-primary);
            max-width: 1100px;
            margin: 0;
            line-height: 0.95;
            letter-spacing: -0.04em;
            opacity: 0;
            transform: translateY(30px);
            animation: revealUp 0.8s var(--ease-out-expo) 0.1s forwards;
        }

        .hero-title span {
            color: var(--text-secondary);
            font-weight: 300;
            font-style: italic;
        }

        .hero-description {
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            font-weight: 400;
            color: var(--text-secondary);
            max-width: 600px;
            line-height: 1.5;
            margin: 0;
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 0.8s var(--ease-out-expo) 0.2s forwards;
        }

        /* -------------------------------------------------------------------------- */
        /*  5. Buttons & Interactions                                                 */
        /* -------------------------------------------------------------------------- */

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 0.8s var(--ease-out-expo) 0.3s forwards;
        }

        .btn {
            font-size: 1rem;
            font-weight: 600;
            padding: 16px 36px;
            border-radius: 100px;
            cursor: pointer;
            transition: var(--smooth-anim);
            border: 1px solid transparent;
            backdrop-filter: blur(10px);
            font-family: inherit;
            /* Use Bricolage Grotesque */
            letter-spacing: -0.01em;
        }

        .btn-primary {
            background-color: #ffffff;
            color: #000;
        }

        .btn-primary:hover {
            background-color: #ffffff;
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.15);
        }

        .btn-outline {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.03) translateY(-2px);
        }

        /* -------------------------------------------------------------------------- */
        /*  6. Background & Effects                                                   */
        /* -------------------------------------------------------------------------- */

        .hero-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        /* Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0;
            animation: fadeIn 1s var(--ease-out-expo) 1s forwards;
        }

        .scroll-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--glass-border), transparent);
            position: relative;
            overflow: hidden;
        }

        .scroll-line::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--text-primary);
            animation: scrollLine 2s infinite;
        }

        @keyframes scrollLine {
            0% {
                top: -100%;
            }

            100% {
                top: 100%;
            }
        }

        @keyframes revealUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Helper for long content scroll visibility */
        .spacer {
            height: 150vh;
        }
    </style>
</head>

<body>

    <!-- Background Image -->
    <img src="https://unsplash.com/photos/nY14Fs8pxT8/download?force=true&w=2400"
        alt="Decorative architectural background" class="background-overlay" />

    <!-- Site Header -->
    <header class="site-header" id="mainHeader">
        <div class="container">
            <span class="brand-name">I</span>
            <div class="brand-reveal-wrapper">
                <span class="brand-name">MRAN</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <section class="hero-section">
            <div class="hero-glow"></div>

            <div class="hero-content container">
                <h1 class="hero-title">
                    Make your website a <span>growth engine.</span>
                </h1>

                <p class="hero-description">
                    I design and develop high-performance websites that turn visitors into customers.
                    Specializing in modern, premium digital experiences.
                </p>

                <div class="btn-group">
                    <button class="btn btn-primary">Get Started</button>
                    <button class="btn btn-outline">View Work</button>
                </div>
            </div>

            <div class="scroll-indicator">
                <span>Scroll</span>
                <div class="scroll-line"></div>
            </div>
        </section>

        <!-- Spacer for scrolling effect -->
        <div class="spacer"></div>
    </main>

    <script>
        /**
         * Simple Scroll Interaction
         * When the user scrolls past a threshold, the header gains an 'active' state
         * which triggers CSS transitions for background blur and brand name collapse.
         */
        const handleScroll = () => {
            const header = document.getElementById('mainHeader');
            const scrollThreshold = 60;

            // Get current scroll position (cross-browser compatible)
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

            if (scrollThreshold < scrollTop) {
                header.classList.add("header--active");
            } else {
                header.classList.remove("header--active");
            }
        };

        // Attach scroll listener with throttling if needed, 
        // but for a simple toggle like this, standard listener is fine.
        window.addEventListener("scroll", handleScroll);

        // Run once on load in case the page is already scrolled
        handleScroll();
    </script>
</body>

</html>
